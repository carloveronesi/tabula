name: Deploy su GitHub Pages

# Pubblica Tabula (PWA in app/) come "project page": carloveronesi.github.io/tabula/
# Il base path /tabula/ è impostato in app/vite.config.ts per la build.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permessi minimi per pubblicare su Pages tramite GITHUB_TOKEN.
permissions:
  contents: read
  pages: write
  id-token: write

# Una sola pubblicazione alla volta; non annulla un deploy già in corso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci

      - run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
